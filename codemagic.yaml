# خطة بناء الآيفون - أكاديمية الشجاع (نسخة SPM)
workflows:
  ios-workflow:
    name: Brave Taekwondo iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build Web Project (Vite)
        script: npm run build
      - name: Capacitor Sync iOS
        script: npx cap sync ios
      - name: Resolve Swift Package Dependencies
        script: |
          cd ios/App
          # الماك رح يدور على التبعيات في المسار اللي لقيناه
          xcodebuild -resolvePackageDependencies -workspace App.xcworkspace -scheme App
      - name: Build iOS App (Unsigned)
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            build \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/App/build/outputs/**/*.app