# خطة بناء الآيفون - أكاديمية الشجاع (نسخة SPM الحديثة)
workflows:
  ios-workflow:
    name: Brave Taekwondo iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build Web Project (Vite)
        script: npm run build
      - name: Capacitor Sync iOS
        script: npx cap sync ios
      - name: Resolve Swift Package Dependencies
        script: |
          cd ios/App
          # التعديل هنا: نستخدم المشروع مباشرة لأننا بنظام SPM
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App
      - name: Build iOS App (Unsigned)
        script: |
          cd ios/App
          # التعديل هنا: بناء المشروع (Project) بدل الـ Workspace
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            build \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      # هذا السطر رح يروح للمكان اللي شفته في الـ Logs ويجيب الملف
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.app
      # وهذا السطر للاحتياط إذا تغير مكانه
      - ios/App/*.app